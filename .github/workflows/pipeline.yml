name: MLOps Hybrid Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/client-ui
  MINIO_BUCKET: ml-models

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    #################################################
    # Pull dataset from DagsHub DVC
    #################################################

    - name: Pull Dataset
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        dvc remote add origin s3://dvc --force
        dvc remote modify origin endpointurl https://dagshub.com/${{ secrets.DAGSHUB_USER }}/${{ secrets.DAGSHUB_REPO }}.s3
        dvc remote modify origin --local access_key_id $AWS_ACCESS_KEY_ID
        dvc remote modify origin --local secret_access_key $AWS_SECRET_ACCESS_KEY
        dvc pull -r origin

    #################################################
    # Train model
    #################################################

    - name: Train Model
      env:
        MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USER }}/${{ secrets.DAGSHUB_REPO }}.mlflow
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USER }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        python train.py

    #################################################
    # Install MinIO client
    #################################################

    - name: Install MinIO Client
      run: |
        curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
        chmod +x mc
        sudo mv mc /usr/local/bin/mc

    #################################################
    # Upload model to MinIO
    #################################################

    - name: Upload Model to MinIO
      env:
        MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
        MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      run: |
        RUN_ID=$(cat run_id.txt)

        mc alias set play \
          https://play.min.io \
          $MINIO_ACCESS_KEY \
          $MINIO_SECRET_KEY

        mc mb play/${{ env.MINIO_BUCKET }} --ignore-existing

        mc cp --recursive \
          exported_model/ \
          play/${{ env.MINIO_BUCKET }}/iris/${RUN_ID}/model/

        echo "MODEL_URI=s3://${{ env.MINIO_BUCKET }}/iris/${RUN_ID}/model" >> $GITHUB_ENV

    #################################################
    # Build UI Image (UPDATED: SHA tagging added)
    #################################################

    - name: Convert Repository Name to Lowercase
      run: |
        echo "LOWERCASE_IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/client-ui" >> $GITHUB_ENV

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push UI Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.ui
        push: true
        tags: |
          ghcr.io/${{ env.LOWERCASE_IMAGE_NAME }}:latest
          ghcr.io/${{ env.LOWERCASE_IMAGE_NAME }}:${{ github.sha }}

    - name: Set UI Image Tag
      run: |
        echo "UI_IMAGE=ghcr.io/${{ env.LOWERCASE_IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

    #################################################
    # Checkout GitOps branch
    #################################################

    - name: Checkout GitOps Branch
      uses: actions/checkout@v4
      with:
        ref: argo
        path: argo-repo

    #################################################
    # Patch KServe Model Manifest
    #################################################

    - name: Update InferenceService
      run: |
        echo "Using ${MODEL_URI}"

        sed -i "s|storageUri:.*|storageUri: \"${MODEL_URI}\"|g" \
          argo-repo/kserve/inference.yaml

    #################################################
    # PATCH UI DEPLOYMENT (NEW)
    #################################################

    - name: Update UI Deployment Image
      run: |
        echo "Using UI image: ${UI_IMAGE}"

        sed -i "s|image: .*client-ui:.*|image: ${UI_IMAGE}|g" \
          argo-repo/kserve/ui-deployment.yaml

    #################################################
    # Commit GitOps Changes
    #################################################

    - name: Commit GitOps Changes
      run: |
        cd argo-repo

        git config user.name "github-actions[bot]"
        git config user.email "actions@github.com"

        git add kserve/inference.yaml kserve/ui-deployment.yaml

        git diff --cached --quiet && exit 0

        git commit -m "gitops: deploy ui ${UI_IMAGE} + model ${MODEL_URI}"
        git push origin argo
