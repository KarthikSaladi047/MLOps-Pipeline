apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-iris-pipeline
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/KarthikSaladi047/MLOps-Pipeline.git'
    targetRevision: argo
    path: kserve
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ml-serving
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true